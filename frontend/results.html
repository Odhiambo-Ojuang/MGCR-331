<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal Entries and Ledger</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f3fff5 0%, #ffffff 45%, #def7e5 100%);
      background-size: 180% 180%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      color: #113322;
      animation: backgroundShift 12s ease-in-out infinite;
    }

    h1 {
      color: #1f7a3e;
      letter-spacing: 0.3px;
      margin-bottom: 18px;
      position: relative;
    }

    h1::after {
      content: "";
      display: block;
      width: 220px;
      height: 3px;
      margin: 10px auto 0;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent 0%, #22c55e 50%, transparent 100%);
      animation: ledgerScan 2.6s ease-in-out infinite;
    }

    .tabs {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
      animation: fadeUp 0.85s ease-out both;
    }

    .tab {
      padding: 10px 20px;
      cursor: pointer;
      background-color: #e9f8ed;
      border: 1px solid #c9edd3;
      margin: 0 5px;
      border-radius: 8px 8px 0 0;
      transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
      color: #1e4f31;
    }

    .tab.active {
      background: linear-gradient(90deg, #15803d 0%, #22c55e 100%);
      color: white;
      transform: translateY(-1px);
      border-color: #188447;
    }

    .content {
      display: none;
      background-color: #ffffff;
      border: 1px solid #c9edd3;
      padding: 24px;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 14px 34px rgba(20, 96, 49, 0.14);
      width: 90%;
      max-width: 800px;
    }

    .content.active {
      display: block;
      animation: fadeUp 0.28s ease-out;
    }

    h2 {
      color: #1f7a3e;
    }

    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: monospace;
      color: #214433;
      background-color: #f7fff9;
      border: 1px solid #d6f2de;
      border-radius: 10px;
      padding: 14px;
    }

    .form-container {
      margin-top: 22px;
      width: 90%;
      max-width: 800px;
      background-color: #ffffff;
      border: 1px solid #c9edd3;
      border-radius: 12px;
      box-shadow: 0 14px 34px rgba(20, 96, 49, 0.12);
      padding: 24px;
      animation: fadeUp 0.9s ease-out 0.15s both;
    }

    .form-container label {
      display: block;
      margin-bottom: 10px;
      color: #2f5a3f;
      font-weight: 600;
    }

    .form-container input[type="file"] {
      display: block;
      width: 100%;
      border: 1px solid #b9e6c6;
      border-radius: 10px;
      padding: 10px;
      background-color: #f7fff9;
      margin-bottom: 16px;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .form-container input[type="file"]:focus,
    .form-container input[type="file"]:focus-visible {
      outline: none;
      border-color: #3fb86a;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
    }

    button {
      position: relative;
      overflow: hidden;
      padding: 10px 20px;
      background: linear-gradient(90deg, #15803d 0%, #22c55e 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 8px 18px rgba(21, 128, 61, 0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    }

    button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -130%;
      width: 70%;
      height: 100%;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.35) 50%, transparent 100%);
      transform: skewX(-24deg);
      animation: buttonSweep 3s ease-in-out infinite 1s;
    }

    button:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(21, 128, 61, 0.32);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes ledgerScan {
      0%, 100% {
        transform: scaleX(0.6);
        opacity: 0.45;
      }
      50% {
        transform: scaleX(1);
        opacity: 1;
      }
    }

    @keyframes buttonSweep {
      0%, 55% {
        left: -130%;
      }
      100% {
        left: 140%;
      }
    }

    @keyframes backgroundShift {
      0% {
        background-position: 0% 40%;
      }
      50% {
        background-position: 100% 60%;
      }
      100% {
        background-position: 0% 40%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <h1>CPA Assistant Results</h1>

  <div class="tabs">
    <div class="tab active" onclick="showTab('journal')">Journal Entries</div>
    <div class="tab" onclick="showTab('ledger')">Ledger by Account</div>
  </div>

  <div id="journal" class="content active">
    <h2>Journal Entries</h2>
    <pre>{{ entries }}</pre>
  </div>

  <div id="ledger" class="content">
    <h2>Ledger Balances</h2>
    <pre>{{ ledger }}</pre>
  </div>

  <div class="form-container">
    <h2>Update Balance Sheet</h2>
    <form action="http://127.0.0.1:5000/update_balance_sheet" method="POST" enctype="multipart/form-data">
      <label for="balance_sheet_file">Upload Previous Fiscal Year Balance Sheet (CSV, TXT)</label>
      <input type="file" id="balance_sheet_file" name="balance_sheet_file" accept=".csv, .txt" required />

      <button type="submit">Update Balance Sheet</button>
    </form>
  </div>


  <script>
    function showTab(id) {
      const tabs = document.querySelectorAll('.tab');
      const contents = document.querySelectorAll('.content');

      tabs.forEach(tab => tab.classList.remove('active'));
      contents.forEach(content => content.classList.remove('active'));

      document.querySelector(`.tab[onclick*="${id}"]`).classList.add('active');
      document.getElementById(id).classList.add('active');
    }
  </script>
</body>
</html>
