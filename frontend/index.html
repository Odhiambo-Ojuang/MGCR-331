<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CPA Assistant - Upload Financing Operations</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: linear-gradient(135deg, #f3fff5 0%, #ffffff 45%, #def7e5 100%);
      background-size: 180% 180%;
      color: #113322;
      animation: backgroundShift 12s ease-in-out infinite;
    }
    .container {
      position: relative;
      background: #ffffff;
      border: 1px solid #c9edd3;
      padding: 24px;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 14px 34px rgba(20, 96, 49, 0.14);
      border-radius: 12px;
      animation: cardEnter 0.7s ease-out;
    }
    h1 {
      position: relative;
      text-align: center;
      color: #1f7a3e;
      letter-spacing: 0.3px;
      margin-bottom: 18px;
    }
    h1::after {
      content: "";
      display: block;
      width: 180px;
      height: 3px;
      margin: 10px auto 0;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent 0%, #22c55e 50%, transparent 100%);
      animation: ledgerScan 2.6s ease-in-out infinite;
    }
    p.description {
      text-align: center;
      color: #2f5a3f;
      margin-bottom: 30px;
      animation: fadeUp 0.9s ease-out 0.15s both;
    }
    input[type="file"] {
      display: block;
      margin: 20px auto;
      width: 100%;
      max-width: 420px;
      border: 1px solid #b9e6c6;
      border-radius: 10px;
      padding: 10px;
      background-color: #f7fff9;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }
    input[type="file"]:focus,
    input[type="file"]:focus-visible {
      outline: none;
      border-color: #3fb86a;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
    }
    button {
      position: relative;
      overflow: hidden;
      display: block;
      margin: 0 auto;
      padding: 10px 20px;
      background: linear-gradient(90deg, #15803d 0%, #22c55e 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 8px 18px rgba(21, 128, 61, 0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      animation: fadeUp 0.95s ease-out 0.25s both;
    }
    button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -130%;
      width: 70%;
      height: 100%;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.35) 50%, transparent 100%);
      transform: skewX(-24deg);
      animation: buttonSweep 3s ease-in-out infinite 1s;
    }
    button:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(21, 128, 61, 0.32);
    }
    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes ledgerScan {
      0%, 100% {
        transform: scaleX(0.6);
        opacity: 0.45;
      }
      50% {
        transform: scaleX(1);
        opacity: 1;
      }
    }

    @keyframes buttonSweep {
      0%, 55% {
        left: -130%;
      }
      100% {
        left: 140%;
      }
    }

    @keyframes backgroundShift {
      0% {
        background-position: 0% 40%;
      }
      50% {
        background-position: 100% 60%;
      }
      100% {
        background-position: 0% 40%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CPA Assistant</h1>
    <p class="description">
      Upload a file with your company's financing operations, and the CPA Assistant will automatically generate the correct journal entries using AI-powered analysis.
    </p>
    <form action="http://127.0.0.1:5000/process_financing_file" method="POST" enctype="multipart/form-data">
      <input type="file" name="financing_file" accept=".txt,.csv" required />
      <button type="submit">Upload & Generate Journal Entries</button>
    </form>
  </div>
</body>
</html>
