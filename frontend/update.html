<!-- frontend/updated_balance_sheet.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Updated Balance Sheet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: linear-gradient(135deg, #f3fff5 0%, #ffffff 45%, #def7e5 100%);
            background-size: 180% 180%;
            color: #113322;
            animation: backgroundShift 12s ease-in-out infinite;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 1px solid #c9edd3;
            border-radius: 12px;
            box-shadow: 0 14px 34px rgba(20, 96, 49, 0.14);
            padding: 24px;
            animation: cardEnter 0.7s ease-out;
        }

        h2 {
            color: #1f7a3e;
            margin-top: 0;
            margin-bottom: 18px;
            position: relative;
        }

        h2::after {
            content: "";
            display: block;
            width: 210px;
            height: 3px;
            margin-top: 10px;
            border-radius: 999px;
            background: linear-gradient(90deg, transparent 0%, #22c55e 50%, transparent 100%);
            animation: ledgerScan 2.6s ease-in-out infinite;
        }

        pre {
            background-color: #f7fff9;
            padding: 1em;
            border: 1px solid #d6f2de;
            border-radius: 10px;
            white-space: pre-wrap;
            color: #214433;
            animation: fadeUp 0.9s ease-out 0.1s both;
        }

        .btn {
            display: inline-block;
            margin-top: 16px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            padding: 10px 20px;
            background: linear-gradient(90deg, #15803d 0%, #22c55e 100%);
            color: #fff;
            border-radius: 8px;
            font-weight: 600;
            box-shadow: 0 8px 18px rgba(21, 128, 61, 0.25);
            transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
            animation: fadeUp 0.95s ease-out 0.2s both;
        }

        .btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -130%;
            width: 70%;
            height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.35) 50%, transparent 100%);
            transform: skewX(-24deg);
            animation: buttonSweep 3s ease-in-out infinite 1s;
        }

        .btn:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
            box-shadow: 0 10px 22px rgba(21, 128, 61, 0.32);
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: translateY(14px) scale(0.99);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes ledgerScan {
            0%, 100% {
                transform: scaleX(0.6);
                opacity: 0.45;
            }
            50% {
                transform: scaleX(1);
                opacity: 1;
            }
        }

        @keyframes buttonSweep {
            0%, 55% {
                left: -130%;
            }
            100% {
                left: 140%;
            }
        }

        @keyframes backgroundShift {
            0% {
                background-position: 0% 40%;
            }
            50% {
                background-position: 100% 60%;
            }
            100% {
                background-position: 0% 40%;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Updated Balance Sheet</h2>
        <pre>{{ updated_sheet }}</pre>
        <a class="btn" href="/">← Back to Home</a>
    </div>
</body>
</html>
